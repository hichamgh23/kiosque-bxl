<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Admin — Le Kiosque BXL{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --navy:        #0d1b2a;
    --navy-mid:    #112240;
    --navy-card:   #152a45;
    --navy-light:  #1e3a5f;
    --gold:        #f5a623;
    --gold-light:  #fbbf24;
    --white:       #f0f4f8;
    --text-body:   #c8d8e8;
    --text-muted:  #7a9ab8;
    --success:     #34d399;
    --danger:      #f87171;
    --warning:     #fbbf24;
    --radius:      12px;
    --nav-h:       60px;
}

body {
    font-family: 'Manrope', sans-serif;
    background: var(--navy);
    color: var(--text-body);
    min-height: 100vh;
}

/* ── Top nav ── */
.a-nav {
    position: sticky; top: 0; z-index: 200;
    height: var(--nav-h);
    background: rgba(13,27,42,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex; align-items: center;
    padding: 0 1.5rem; gap: 1.5rem;
}
.a-nav-brand {
    display: flex; align-items: center; gap: 0.6rem;
    font-family: 'Fraunces', serif; font-size: 1rem;
    color: var(--white); text-decoration: none; flex-shrink: 0;
}
.a-nav-brand .ico { font-size: 1.3rem; }
.a-nav-brand .sep { color: rgba(255,255,255,0.2); margin: 0 0.2rem; }
.a-nav-brand .tag {
    font-size: 0.6rem; font-weight: 800; letter-spacing: 1.5px;
    background: rgba(245,166,35,0.15); border: 1px solid rgba(245,166,35,0.3);
    color: var(--gold); padding: 0.15rem 0.5rem; border-radius: 99px;
    text-transform: uppercase;
}

.a-nav-links { display: flex; gap: 0.25rem; flex: 1; }
.a-nav-link {
    display: flex; align-items: center; gap: 0.4rem;
    padding: 0.45rem 0.85rem; border-radius: 8px;
    color: var(--text-muted); text-decoration: none;
    font-size: 0.83rem; font-weight: 600; transition: all 0.15s;
    white-space: nowrap;
}
.a-nav-link:hover { color: var(--white); background: rgba(255,255,255,0.05); }
.a-nav-link.active { color: var(--white); background: rgba(245,166,35,0.1); }
.a-nav-link .ico { font-size: 1rem; }
.a-nav-badge {
    background: var(--danger); color: #fff;
    font-size: 0.6rem; font-weight: 800;
    padding: 0.1rem 0.4rem; border-radius: 99px; min-width: 16px; text-align: center;
}

.a-nav-right { margin-left: auto; display: flex; align-items: center; gap: 0.5rem; }
.a-logout {
    display: flex; align-items: center; gap: 0.35rem;
    padding: 0.4rem 0.8rem; border-radius: 8px;
    color: var(--text-muted); text-decoration: none;
    font-size: 0.8rem; font-weight: 600; transition: all 0.15s;
    border: 1px solid rgba(255,255,255,0.1);
}
.a-logout:hover { color: var(--danger); border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.05); }

/* ── Content ── */
.a-content {
    max-width: 1140px; margin: 0 auto;
    padding: 2rem 1.5rem 5rem;
}

/* ── Cards / Panels ── */
.a-card {
    background: var(--navy-card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: var(--radius);
    overflow: hidden;
}
.a-card-head {
    padding: 1rem 1.3rem;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    font-family: 'Fraunces', serif; font-size: 0.95rem; color: var(--white);
    display: flex; align-items: center; justify-content: space-between; gap: 1rem;
}
.a-card-body { padding: 1.3rem; }

/* ── Boutons ── */
.btn {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-family: 'Manrope', sans-serif; font-weight: 700;
    border: none; cursor: pointer; text-decoration: none;
    border-radius: var(--radius); transition: all 0.2s;
    padding: 0.65rem 1.4rem; font-size: 0.88rem;
}
.btn-gold { background: var(--gold); color: var(--navy); }
.btn-gold:hover { background: var(--gold-light); }
.btn-sm { padding: 0.4rem 0.9rem; font-size: 0.8rem; }
.btn-ghost { background: rgba(255,255,255,0.06); color: var(--white); border: 1px solid rgba(255,255,255,0.1); }
.btn-ghost:hover { background: rgba(255,255,255,0.1); }

/* ── Form elements ── */
.form-select, .form-input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: var(--white);
    padding: 0.6rem 0.9rem;
    font-family: 'Manrope', sans-serif; font-size: 0.88rem;
    outline: none; transition: border-color 0.2s;
    appearance: none; -webkit-appearance: none;
}
.form-select:focus, .form-input:focus { border-color: var(--gold); }
.form-select option { background: var(--navy-mid); color: var(--white); }

/* ── Status badges ── */
.badge {
    display: inline-block; padding: 0.25rem 0.7rem;
    border-radius: 99px; font-size: 0.7rem; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.3px;
}
.badge-en_attente    { background: rgba(245,166,35,0.12); color: var(--gold); }
.badge-confirmee     { background: rgba(96,165,250,0.12); color: #60a5fa; }
.badge-en_livraison  { background: rgba(167,139,250,0.12); color: #a78bfa; }
.badge-devant_maison { background: rgba(52,211,153,0.12); color: #34d399; }
.badge-livree        { background: rgba(52,211,153,0.15); color: var(--success); }
.badge-annulee       { background: rgba(248,113,113,0.12); color: var(--danger); }

/* ── Mobile ── */
@media (max-width: 640px) {
    .a-nav { padding: 0 1rem; gap: 0.75rem; }
    .a-nav-link span:not(.ico) { display: none; }
    .a-nav-link { padding: 0.45rem 0.6rem; }
    .a-content { padding: 1.2rem 1rem 4rem; }
}
</style>
{% block extra_css %}{% endblock %}
</head>
<body>

<nav class="a-nav">
    <a href="{% url 'admin_dashboard' %}" class="a-nav-brand">
        <span class="ico">🛵</span>
        Le Kiosque
        <span class="sep">|</span>
        <span class="tag">Admin</span>
    </a>

    <div class="a-nav-links">
        <a href="{% url 'admin_dashboard' %}" class="a-nav-link {% block nav_commandes %}{% endblock %}">
            <span class="ico">📦</span><span>Commandes</span>
            {% if pending_count %}<span class="a-nav-badge">{{ pending_count }}</span>{% endif %}
        </a>
        <a href="{% url 'admin_support' %}" class="a-nav-link {% block nav_support %}{% endblock %}">
            <span class="ico">💬</span><span>Support</span>
        </a>
    </div>

    <div class="a-nav-right">
        <a href="{% url 'admin_logout' %}" class="a-logout">
            <span>🔓</span><span>Déconnexion</span>
        </a>
    </div>
</nav>

<div class="a-content">
    {% block content %}{% endblock %}
</div>

{% block extra_js %}{% endblock %}
</body>
</html>
